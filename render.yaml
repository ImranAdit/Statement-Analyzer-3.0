services:
  # ── Backend (Python / FastAPI) ─────────────────────────────────────────────
  - type: web
    name: adit-analyser-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: BACKEND_URL
        value: https://adit-analyser-api.onrender.com   # update after first deploy
      - key: FRONTEND_URL
        value: https://adit-analyser.onrender.com        # update after first deploy

  # ── Frontend (Node / Vite → static site) ──────────────────────────────────
  - type: web
    name: adit-analyser
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://adit-analyser-api.onrender.com   # update after first deploy
